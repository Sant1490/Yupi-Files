<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Libro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ddd;
}

#toolbar {
    background: #222;
    padding: 10px;
    display: none;
}

button {
    margin: 5px;
    padding: 8px;
    border: none;
    cursor: pointer;
}

#page {
    background: white;
    width: 80%;
    margin: 20px auto;
    padding: 30px;
    min-height: 500px;
    border-radius: 10px;
}

img {
    max-width: 100%;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="toolbar">
    <button onclick="format('bold')">Negrita</button>
    <button onclick="format('italic')">Cursiva</button>

    <button onclick="changeSize(5)">A+</button>
    <button onclick="changeSize(3)">A-</button>

    <button onclick="addImage()">Imagen</button>

    <button onclick="newPage()">➕ Añadir página</button>
    <button onclick="prevPage()">⬅️</button>
    <button onclick="nextPage()">➡️</button>
</div>

<div id="page" contenteditable="false"></div>

<input type="file" id="imgInput" accept="image/*" style="display:none">

<script>
const params = new URLSearchParams(window.location.search);
const isEdit = params.get("edit") === "1";

const pageDiv = document.getElementById("page");
const toolbar = document.getElementById("toolbar");

let pages = JSON.parse(localStorage.getItem("bookPages")) || [
    "<h1>Mi libro</h1><p>Empieza a escribir...</p>"
];

let currentPage = 0;

// Activar modo edición
if (isEdit) {
    toolbar.style.display = "block";
    pageDiv.contentEditable = true;
}

// Mostrar página
function showPage() {
    pageDiv.innerHTML = pages[currentPage];
}
showPage();

// Guardar cambios
pageDiv.addEventListener("input", () => {
    if (isEdit) {
        pages[currentPage] = pageDiv.innerHTML;
        save();
    }
});

// Guardar
function save() {
    localStorage.setItem("bookPages", JSON.stringify(pages));
}

// Nueva página
function newPage() {
    pages.push("<h2>Nueva página</h2>");
    currentPage = pages.length - 1;
    save();
    showPage();
}

// Navegación
function nextPage() {
    if (currentPage < pages.length - 1) {
        currentPage++;
        showPage();
    }
}

function prevPage() {
    if (currentPage > 0) {
        currentPage--;
        showPage();
    }
}

// Formato
function format(cmd) {
    document.execCommand(cmd);
}

// Tamaño de texto
function changeSize(size) {
    document.execCommand("fontSize", false, size);
}

// Imagen
function addImage() {
    document.getElementById("imgInput").click();
}

document.getElementById("imgInput").addEventListener("change", function() {
    const file = this.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        document.execCommand("insertImage", false, e.target.result);
    };

    reader.readAsDataURL(file);
});
</script>

</body>
</html>
